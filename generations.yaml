  - name: "First Generation"
    start_year: 2003
    end_year: 2011
    description: "The Honda Element was a compact crossover SUV manufactured by Honda from model years 2003–2011. Produced at the East Liberty Auto Plant in Ohio, it featured distinctive boxy styling with bi-parting rear doors (no B-pillar design) and a highly versatile, washable interior designed for outdoor enthusiasts. Built on a modified second-generation Honda CR-V platform, it was available in front-wheel drive or all-wheel drive (Real Time 4WD). Power came from a 2.4L K-series i-VTEC inline-four engine producing 160 hp (2003–2006) and 166 hp (2007–2011). Transmission options included a 5-speed manual (2003–2010) and automatic transmissions—a 4-speed (2003–2006) replaced by a 5-speed (2007–2011). The interior featured removable rear seats, TPO-coated urethane flooring, and stain-resistant fabrics. A mild refresh in 2007 updated the grille, added standard side airbags and electronic stability control, and introduced the SC trim. Minor updates in 2009 included revised front fenders (metal instead of composite), squared wheel arches, and new color combinations. Trim levels included DX, LX, EX, and SC. Despite developing a cult following for its unique design and practicality, production ended in April 2011 with approximately 325,000 units produced."